input {
  beats {
    port => 5044
  }
}

filter {
  json {
    source => "message"
  }

  if !([level] and [service] and [player_id] and [player_name] and [event_type] and [linked_gate] and [status] and [message]) {
    mutate {
      add_tag => ["missing_required_fields"]
    }
  }

  if [event_type] == "Invalid Gate Request" {
    mutate {
      add_tag => ["suspicious_activity"]
    }
  }

  if [event_type] == "Challenge Failed" {
    mutate {
      add_tag => ["challenge_failed"]
    }
  }
}

output {
  if "_jsonparsefailure" in [tags] or "missing_required_fields" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "linked-verse-errors-%{+YYYY.MM.dd}"
    }
  } 
  else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "linked-verse-logs-%{+YYYY.MM.dd}"
    }
  }
  
  stdout { 
    codec => rubydebug 
  }
}
